name: Auto PR to Main

on:
  push:
    branches: [development]

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create or update Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin main

          COMMITS=$(git log origin/main..HEAD --pretty=format:"- %s" --no-merges)
          TITLE=$(git log origin/main..HEAD --pretty=format:"%s" --no-merges | head -1)

          if [ -z "$COMMITS" ]; then
            echo "No new commits — skipping."
            exit 0
          fi

          BODY="$(printf 'Commits included:\n\n%s' "$COMMITS")"

          gh pr create \
            --base main \
            --head development \
            --title "$TITLE" \
            --body "$BODY" \
          || gh pr edit development \
            --title "$TITLE" \
            --body "$BODY"
